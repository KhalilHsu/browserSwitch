<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BrowserRouter Status Icon Preview</title>
  <style>
    body {
      margin: 0;
      font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #111;
      background: #f5f5f5;
    }

    main {
      max-width: 760px;
      margin: 36px auto;
      padding: 0 24px;
    }

    h1 {
      margin: 0 0 18px;
      font-size: 18px;
      font-weight: 650;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
    }

    figure {
      margin: 0;
      padding: 18px;
      border: 1px solid #d9d9d9;
      border-radius: 8px;
      background: #fff;
    }

    .bar {
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      background: linear-gradient(#f8f8f8, #dedede);
      box-shadow: inset 0 0 0 1px #c9c9c9;
    }

    img {
      width: 22px;
      height: 22px;
      display: block;
    }

    figcaption {
      margin-top: 12px;
      text-align: center;
      font-size: 12px;
      color: #333;
    }
  </style>
</head>
<body>
  <main>
    <h1>BrowserRouter Status Icon Options</h1>
    <div class="grid">
      <figure>
        <div class="bar"><img src="./router-fork-arrows.svg" alt="Fork arrows"></div>
        <figcaption>A. Fork arrows</figcaption>
      </figure>
      <figure>
        <div class="bar"><img src="./router-logo-endpoints.svg" alt="Logo endpoints"></div>
        <figcaption>B. Logo endpoints</figcaption>
      </figure>
      <figure>
        <div class="bar"><img src="./router-compact-split.svg" alt="Compact split"></div>
        <figcaption>C. Compact split</figcaption>
      </figure>
      <figure>
        <div class="bar"><img src="./router-window-route.svg" alt="Window route"></div>
        <figcaption>D. Window route</figcaption>
      </figure>
    </div>
  </main>
</body>
</html>
